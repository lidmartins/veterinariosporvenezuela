<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" width="400" height="420">

  <!-- Background -->
  <rect width="400" height="420" fill="#FAF7F2" rx="40"/>

  <!-- Icon box teal rounded square - centered -->
  <rect x="110" y="55" width="180" height="180" rx="38" fill="#0F766E"/>

  <!-- Cross vertical bar -->
  <rect x="191" y="90" width="18" height="110" rx="9" fill="white"/>
  <!-- Cross horizontal bar -->
  <rect x="146" y="135" width="108" height="18" rx="9" fill="white"/>

  <!-- Text Veterinarios -->
  <text x="200" y="305" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="30" fill="#163b37" text-anchor="middle">Veterinarios</text>

  <!-- Text por Venezuela teal -->
  <text x="200" y="340" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="30" fill="#0F766E" text-anchor="middle">por Venezuela</text>

  <!-- Venezuelan flag stripe yellow blue red -->
  <rect x="100" y="360" width="60" height="7" rx="3.5" fill="#F8C13A"/>
  <rect x="170" y="360" width="60" height="7" rx="3.5" fill="#1f55a8"/>
  <rect x="240" y="360" width="60" height="7" rx="3.5" fill="#cf2b2b"/>

  <!-- Tagline -->
  <text x="200" y="398" font-family="Arial, sans-serif" font-size="12" fill="#9aa49f" text-anchor="middle" letter-spacing="3">RED DE EMERGENCIA</text>
</svg>